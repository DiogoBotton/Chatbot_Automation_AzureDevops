services:
  api:
    build:
      context: ./backend # Configura o contexto
      dockerfile: Dockerfile # A partir do contexto, indica o caminho até o Dockerfile
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY} # Passa a variável de ambiente do host para o container
      - AZURE_DEVOPS_ORGANIZATION_URL=${AZURE_DEVOPS_ORGANIZATION_URL}
      - AZURE_DEVOPS_PAT=${AZURE_DEVOPS_PAT}
    ports:
      - "5000:5000"
    networks:
      - app_network

  front:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - API_URL=http://api:5000 # Aponta a URL da API para o container do frontend (utiliza o nome do serviço "api" definido no docker-compose como hostname)
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - app_network

networks:
  app_network:
    driver: bridge
